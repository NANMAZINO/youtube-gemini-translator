<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube AI Translator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell" id="shell">
      <section class="hero">
        <div class="hero-top-row">
          <div class="hero-title-row">
            <h1 id="appTitle"></h1>
            <button
              id="heroInfoBadge"
              class="info-badge"
              type="button"
            >
              i
            </button>
            <span class="version" id="version"></span>
          </div>
        </div>
        <div class="hero-toolbar">
          <div class="hero-preferences">
            <label class="hero-control" for="uiLocale">
              <span id="uiLocaleLabel"></span>
              <select id="uiLocale"></select>
            </label>
            <label class="hero-control" for="themeMode">
              <span id="themeModeLabel"></span>
              <select id="themeMode"></select>
            </label>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2 id="apiKeyTitle"></h2>
        </div>
        <div class="settings-grid">
          <label>
            <span id="apiKeyLabel"></span>
            <div class="input-row">
              <input
                id="apiKey"
                class="input"
                type="password"
                autocomplete="off"
                spellcheck="false"
              />
              <button
                id="toggleApiKey"
                class="secondary"
                type="button"
                aria-controls="apiKey"
                aria-pressed="false"
              >
              </button>
            </div>
          </label>
          <div class="button-row">
            <button id="saveApiKey" type="button" class="primary"></button>
            <button id="clearApiKey" type="button" class="secondary"></button>
          </div>
          <p class="hint" id="apiKeyHint"></p>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2 id="settingsTitle"></h2>
        </div>
        <form id="settingsForm" class="settings-grid">
          <label>
            <span id="sourceLangLabel"></span>
            <select id="sourceLang"></select>
          </label>
          <label>
            <span id="targetLangLabel"></span>
            <select id="targetLang"></select>
          </label>
          <label>
            <span class="label-with-badge">
              <span id="thinkingLevelLabel"></span>
              <button
                id="thinkingLevelInfoBadge"
                class="info-badge info-badge-sm"
                type="button"
              >
                i
              </button>
            </span>
            <select id="thinkingLevel"></select>
          </label>
          <label class="toggle">
            <span class="label-with-badge">
              <span id="resumeModeLabel"></span>
              <button
                id="resumeModeInfoBadge"
                class="info-badge info-badge-sm"
                type="button"
              >
                i
              </button>
            </span>
            <input id="resumeMode" type="checkbox" />
          </label>
          <button type="submit" id="saveSettings" class="primary"></button>
        </form>
      </section>

      <section class="stats-grid">
        <article class="stat-card">
          <span class="stat-label" id="todayLabel"></span>
          <strong id="todayTokens">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label" id="monthlyLabel"></span>
          <strong id="monthlyTokens">0</strong>
        </article>
        <article class="stat-card">
          <div class="stat-label-row">
            <span class="stat-label" id="costLabel"></span>
            <button
              id="costInfoBadge"
              class="info-badge info-badge-sm"
              type="button"
            >
              i
            </button>
          </div>
          <strong id="estimatedCost">$0.000</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label" id="cacheLabel"></span>
          <strong id="cacheCount">0</strong>
        </article>
      </section>

      <section class="card">
        <div class="card-header">
          <h2 id="cacheTitle"></h2>
        </div>
        <div class="button-row">
          <button id="clearCache" type="button" class="secondary"></button>
        </div>
        <p id="cacheSummary" class="hint"></p>
        <ul id="cacheList" class="cache-list"></ul>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>
      <div id="infoPopover" class="info-popover" hidden role="dialog" aria-live="polite">
        <p id="infoPopoverText"></p>
      </div>
    </main>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
