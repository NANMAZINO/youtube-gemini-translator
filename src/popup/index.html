<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube AI Translator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell" id="shell">
      <section class="hero">
        <div class="hero-copy">
          <h1>YouTube AI Translator</h1>
        </div>
        <span class="version" id="version"></span>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>Gemini API Key</h2>
        </div>
        <div class="settings-grid">
          <label>
            <span>API key</span>
            <div class="input-row">
              <input
                id="apiKey"
                class="input"
                type="password"
                placeholder="Enter your API key"
                autocomplete="off"
                spellcheck="false"
              />
              <button
                id="toggleApiKey"
                class="secondary"
                type="button"
                aria-controls="apiKey"
                aria-pressed="false"
                aria-label="Show API key"
              >
                Show
              </button>
            </div>
          </label>
          <div class="button-row">
            <button id="saveApiKey" type="button" class="primary">Save key</button>
            <button id="clearApiKey" type="button" class="secondary">Clear</button>
          </div>
          <p class="hint">
            Create a key in
            <a href="https://aistudio.google.com/apikey" target="_blank" rel="noreferrer">Google AI Studio</a>.
          </p>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>Settings</h2>
        </div>
        <form id="settingsForm" class="settings-grid">
          <label>
            <span>Source language</span>
            <select id="sourceLang">
              <option value="Auto">Auto</option>
              <option value="한국어">한국어</option>
              <option value="English">English</option>
              <option value="日本語">日本語</option>
            </select>
          </label>
          <label>
            <span>Target language</span>
            <select id="targetLang">
              <option value="한국어">한국어</option>
              <option value="English">English</option>
              <option value="日本語">日本語</option>
            </select>
          </label>
          <label>
            <span>Translation depth</span>
            <select id="thinkingLevel">
              <option value="minimal">Minimal</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </label>
          <label class="toggle">
            <span>Resume unfinished runs</span>
            <input id="resumeMode" type="checkbox" />
          </label>
          <button type="submit" class="primary">Save settings</button>
        </form>
      </section>

      <section class="stats-grid">
        <article class="stat-card">
          <span class="stat-label">Today</span>
          <strong id="todayTokens">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">30 Days</span>
          <strong id="monthlyTokens">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Cost</span>
          <strong id="estimatedCost">$0.000</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">Cache</span>
          <strong id="cacheCount">0</strong>
        </article>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>Cache</h2>
        </div>
        <div class="button-row">
          <button id="clearCache" type="button" class="secondary">Clear cache</button>
        </div>
        <p id="cacheSummary" class="hint">No saved subtitle bundles yet.</p>
        <ul id="cacheList" class="cache-list"></ul>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
