name: Release Extension

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run check

      - name: Read package version
        id: package
        run: |
          version=$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync("package.json", "utf8")).version)')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          mkdir -p release/youtube-ai-translator
          cp -r dist/. release/youtube-ai-translator/
          cd release
          zip -r "../youtube-ai-translator-v${{ steps.package.outputs.version }}.zip" youtube-ai-translator

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-ai-translator-v${{ steps.package.outputs.version }}
          path: youtube-ai-translator-v${{ steps.package.outputs.version }}.zip
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: youtube-ai-translator-v${{ steps.package.outputs.version }}.zip
          generate_release_notes: true
